[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "behavioral-analysis"
version = "0.1.0"
description = "GUI tool for analyzing behavioral experiment data (VOR, OKR)"
readme = "README.md"
requires-python = ">=3.9,<3.10"
dependencies = [
    "raymond-lab-core",
    "PySide6",
    "pyqtgraph",
]

[project.scripts]
behavioral-analysis = "behavioral_analysis.views.main_window:main"

[tool.uv.sources]
raymond-lab-core = { workspace = true }
